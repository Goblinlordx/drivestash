spec:
  summary: >
    GitHub Actions CI/CD pipeline for automated testing, type checking, and
    npm publishing on tagged releases.
  context: |
    drivestash needs a reliable publish pipeline to ship as a public npm package.
    This includes CI checks on every push/PR and automated npm publish when a
    version tag is pushed.
  codebase_analysis: |
    Current state:
    - tsup build already configured and working
    - vitest configured but no tests yet (tests come from other tracks)
    - TypeScript strict mode enabled
    - package.json has prepublishOnly script
    - No CI/CD configuration exists yet
  acceptance_criteria:
    - "GitHub Actions CI workflow runs on push to main and on PRs"
    - "CI runs: install, typecheck, lint, test, build"
    - "Publish workflow triggers on version tags (v*)"
    - "Publish workflow builds and publishes to npm"
    - "npm provenance enabled for supply chain security"
    - "CLAUDE.md created with project conventions for developer agents"
  out_of_scope: |
    - Changelog generation tools (manual for now)
    - Monorepo tooling
    - CDN publishing (jsDelivr, unpkg work automatically with npm)
  technical_notes: |
    Two GitHub Actions workflows:
    1. ci.yml — runs on push/PR, does typecheck + test + build
    2. publish.yml — runs on v* tags, publishes to npm with provenance

    npm token stored as NPM_TOKEN repository secret (manual setup required).

    File structure:
    - .github/workflows/ci.yml
    - .github/workflows/publish.yml
    - CLAUDE.md — project conventions
