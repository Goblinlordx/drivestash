title: Sync Engine Core
type: feature
status: pending
created: 2026-03-22
updated: '2026-03-22'
spec:
  summary: 'Core sync engine that orchestrates bidirectional sync between LocalStore and DriveAdapter. Provides createSyncEngine()
    factory, LWW merge, observable sync status, and auto-sync triggers.

    '
  context: 'The trip-planning app''s sync-manager.ts (184 lines) handles the full sync lifecycle:

    pull, merge, push, status tracking, and auto-triggers. This track extracts and

    generalizes that into the main public API of the drivestash package.


    Reference: https://github.com/Goblinlordx/trip-planning (webapp/src/lib/sync-manager.ts)

    '
  codebase_analysis: 'The existing sync-manager.ts implements:

    - LWW merge: per-record, compare timestamps, keep newest

    - resolveFileId(): lazy lookup of remote file by name

    - pullStamps(): download remote → merge with local → write to IndexedDB

    - pushStamps(): read local → upload to Drive (create or update)

    - fullSync(): pull then push

    - Status observable: idle/syncing/synced/offline/error with listener set

    - Online/offline listener: flush pending on reconnect

    - Visibility listener: fullSync when tab becomes visible

    - Pending sync queue: coalesce rapid writes into single push

    - syncInProgress guard: prevent concurrent syncs


    Key patterns to preserve:

    - Optimistic local-first (write local, async push)

    - Coalesced pending sync (multiple writes → single push)

    - Auto-sync on visibility change (multi-device awareness)

    - Status observable pattern

    '
  acceptance_criteria:
  - Exports createSyncEngine<T>(config) factory returning a SyncEngine instance
  - SyncEngine.put(record) writes locally and triggers async push
  - SyncEngine.get(id) reads from local store
  - SyncEngine.delete(id) removes locally and triggers async push
  - SyncEngine.list() returns all local records
  - SyncEngine.sync() performs full bidirectional sync (pull + merge + push)
  - SyncEngine.pull() pulls remote and merges into local
  - SyncEngine.push() pushes local to remote
  - Default LWW merge strategy, configurable via config.merge
  - Observable sync status (idle/syncing/synced/offline/error)
  - Auto-sync on online/offline transition
  - Auto-sync on document visibility change
  - Pending sync coalescing (rapid writes → single push)
  - Concurrent sync guard (no overlapping syncs)
  - SyncEngine.destroy() cleans up listeners and state
  - Unit tests for merge logic, sync orchestration, and status transitions
  out_of_scope: '- React hooks or framework bindings (separate package concern)

    - Retry with exponential backoff (v2 feature)

    - Compression or chunking

    - Multi-file sync (one engine = one document)

    '
  technical_notes: 'Approach: createSyncEngine<T extends SyncRecord>(config) instantiates a

    LocalStore and DriveAdapter internally, wires up the sync logic, and returns

    a clean public API object.


    The merge function signature: (local: T[], remote: T[]) => T[]

    Default implementation: LWW per-record using updatedAt field.


    Sync flow:

    1. pull: download remote → merge(local, remote) → bulkPut merged to local

    2. push: list local → upload to remote (create or update)

    3. sync: pull() then push()


    File structure:

    - src/merge.ts — LWW merge + merge type

    - src/sync-engine.ts — main engine factory

    - src/sync-engine.test.ts — tests

    - src/merge.test.ts — merge tests

    '
